<!doctype html>
<!-- Phase-2 harness (WIDGET.md §11 acceptance Pha 2): the 1.004222 form subset
     (≥3 schema fields → DETECTED_READY) with the two web components placed the
     way the portal would place them. Kept separate from acceptance.html so the
     Pha-1 scenarios never see stray blur-validations from field-hints. -->
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trang thử nghiệm Pha 2 — Tờ khai CT01</title>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: .75rem; }
    input, select, textarea { display: block; margin-top: .25rem; width: 100%; max-width: 24rem; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1>Tờ khai thay đổi thông tin cư trú (CT01) — Phase 2 preview</h1>

  <form id="wizard-form" action="#">
    <label for="f-ho-ten">Họ, chữ đệm và tên khai sinh</label>
    <input id="f-ho-ten" type="text" name="ho_ten_khai_sinh">

    <label for="f-ngay-sinh">Ngày, tháng, năm sinh</label>
    <input id="f-ngay-sinh" type="date" name="ngay_sinh">

    <label for="f-so-dinh-danh">Số định danh cá nhân</label>
    <input id="f-so-dinh-danh" type="text" name="so_dinh_danh_ca_nhan" maxlength="12" inputmode="numeric">
    <opengov-field-hint field="so_dinh_danh_ca_nhan"></opengov-field-hint>

    <label for="f-ho-ten-chu-ho">Họ, chữ đệm và tên chủ hộ</label>
    <input id="f-ho-ten-chu-ho" type="text" name="ho_ten_chu_ho">

    <label for="f-quan-he">Mối quan hệ với chủ hộ</label>
    <select id="f-quan-he" name="moi_quan_he_voi_chu_ho">
      <option value="">-- Chọn --</option>
      <option value="Vợ">Vợ</option>
      <option value="Chồng">Chồng</option>
      <option value="Con">Con</option>
      <option value="Khác">Khác</option>
    </select>

    <label for="f-so-dinh-danh-chu-ho">Số định danh cá nhân của chủ hộ</label>
    <input id="f-so-dinh-danh-chu-ho" type="text" name="so_dinh_danh_ca_nhan_chu_ho" maxlength="12">

    <label for="f-yk-chu-ho-sdd">Số định danh cá nhân (chủ hộ — mục ý kiến)</label>
    <input id="f-yk-chu-ho-sdd" type="text" name="y_kien_chu_ho_so_dinh_danh" maxlength="12">

    <label for="f-noi-dung">Nội dung đề nghị</label>
    <textarea id="f-noi-dung" name="noi_dung_de_nghi" rows="3"></textarea>
    <opengov-field-hint field="noi_dung_de_nghi" hint="Ghi rõ đề nghị đăng ký thường trú tại địa chỉ nào."></opengov-field-hint>
  </form>

  <p>
    <opengov-check-button></opengov-check-button>
    <button form="wizard-form" type="submit">Tiếp tục</button>
  </p>

  <script src="/dist/opengov.js" data-backend="%BACKEND%"></script>
</body>
</html>
